name: Job Agent

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: node src/searchJobs.js
        env:
          VITE_ADZUNA_APP_ID: ${{ secrets.VITE_ADZUNA_APP_ID }}
          VITE_ADZUNA_APP_KEY: ${{ secrets.VITE_ADZUNA_APP_KEY }}
          VITE_SERPAPI_KEY: ${{ secrets.VITE_SERPAPI_KEY }}

      - run: node src/scoreJobs.js
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_GEMINI_MODEL_URL: ${{ secrets.VITE_GEMINI_MODEL_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}

      - run: node src/saveSupabase.js
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_KEY: ${{ secrets.VITE_SUPABASE_KEY }}
          VITE_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.VITE_SUPABASE_SERVICE_ROLE_KEY }}

      - run: node src/notifyTelegram.js
        env:
          VITE_TELEGRAM_TOKEN: ${{ secrets.VITE_TELEGRAM_TOKEN }}
          VITE_TELEGRAM_CHAT_ID: ${{ secrets.VITE_TELEGRAM_CHAT_ID }}
