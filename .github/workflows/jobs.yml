name: Job Agent Workflow

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: node src/searchJobs.js
      - run: node src/scoreJobs.js
      - run: node src/saveSupabase.js
      - run: node src/notifyTelegram.js
