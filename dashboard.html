<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Job Agent Dashboard</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f6f8;
      color: #1a1a1a;
      padding: 24px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    h1 { font-size: 22px; font-weight: 700; }
    .stats {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .stat {
      background: #fff;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .stat strong { font-size: 18px; display: block; }
    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .filters input, .filters select {
      padding: 7px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      background: #fff;
    }
    .filters input { flex: 1; min-width: 200px; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    th {
      background: #f8f9fa;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: #666;
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    th:hover { background: #eee; }
    td {
      padding: 10px 12px;
      font-size: 13px;
      border-top: 1px solid #f0f0f0;
      vertical-align: middle;
    }
    tr:hover { background: #fafbfc; }
    .score {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 12px;
    }
    .score-high { background: #d4edda; color: #155724; }
    .score-mid { background: #fff3cd; color: #856404; }
    .score-low { background: #f8d7da; color: #721c24; }
    .status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .status-new { background: #cce5ff; color: #004085; }
    .status-applied { background: #d4edda; color: #155724; }
    .status-rejected { background: #f8d7da; color: #721c24; }
    .status-interview { background: #d1ecf1; color: #0c5460; }
    a { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .links a { margin-right: 6px; font-size: 12px; }
    .loading {
      text-align: center;
      padding: 48px;
      color: #888;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .config-form {
      background: #fff;
      padding: 24px;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
      max-width: 500px;
      margin: 40px auto;
    }
    .config-form h2 { margin-bottom: 16px; font-size: 18px; }
    .config-form label { display: block; margin-bottom: 4px; font-size: 13px; color: #555; }
    .config-form input { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 12px; font-size: 13px; }
    .config-form button {
      width: 100%; padding: 10px; background: #333; color: #fff; border: none;
      border-radius: 6px; font-size: 14px; cursor: pointer;
    }
    .config-form button:hover { background: #555; }
    @media (max-width: 700px) {
      body { padding: 12px; }
      table, thead, tbody, th, td, tr { display: block; }
      th { display: none; }
      td { padding: 8px; border: none; }
      td::before { content: attr(data-label); font-weight: 600; display: inline-block; width: 100px; font-size: 11px; color: #888; }
      tr { border-bottom: 2px solid #eee; margin-bottom: 8px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Job Agent Dashboard</h1>
    <div class="stats">
      <div class="stat"><strong id="total">-</strong>Total</div>
      <div class="stat"><strong id="avgScore">-</strong>Score avg</div>
      <div class="stat"><strong id="newCount">-</strong>NEW</div>
    </div>
  </header>

  <div class="filters">
    <input type="text" id="search" placeholder="Buscar empresa o título..." oninput="render()">
    <select id="scoreFilter" onchange="render()">
      <option value="all">Todos los scores</option>
      <option value="90">≥ 90</option>
      <option value="80">≥ 80</option>
      <option value="75">≥ 75</option>
      <option value="60">≥ 60</option>
    </select>
    <select id="statusFilter" onchange="render()">
      <option value="all">Todos los estados</option>
      <option value="NEW">NEW</option>
      <option value="APPLIED">APPLIED</option>
      <option value="INTERVIEW">INTERVIEW</option>
      <option value="REJECTED">REJECTED</option>
    </select>
  </div>

  <div id="error" class="error" style="display:none"></div>
  <div id="loading" class="loading">Cargando aplicaciones...</div>
  <div id="tableContainer"></div>

  <script>
    let SUPABASE_URL = localStorage.getItem('supabase_url') || '';
    let SUPABASE_KEY = localStorage.getItem('supabase_key') || '';
    let applications = [];

    function showConfig() {
      document.getElementById('tableContainer').innerHTML = `
        <div class="config-form">
          <h2>Conectar a Supabase</h2>
          <label>Supabase URL</label>
          <input type="url" id="inputUrl" value="${SUPABASE_URL}" placeholder="https://xyz.supabase.co">
          <label>Anon Key</label>
          <input type="text" id="inputKey" value="${SUPABASE_KEY}" placeholder="eyJhbGciOi...">
          <button onclick="connect()">Conectar</button>
          <p style="margin-top:12px;font-size:12px;color:#888">Las credenciales se guardan localmente.</p>
        </div>
      `;
      document.getElementById('loading').style.display = 'none';
    }

    window.connect = function() {
      SUPABASE_URL = document.getElementById('inputUrl').value.trim();
      SUPABASE_KEY = document.getElementById('inputKey').value.trim();
      if (!SUPABASE_URL || !SUPABASE_KEY) return alert('Completá ambos campos');
      localStorage.setItem('supabase_url', SUPABASE_URL);
      localStorage.setItem('supabase_key', SUPABASE_KEY);
      init();
    };

    async function init() {
      if (!SUPABASE_URL || !SUPABASE_KEY) { showConfig(); return; }

      try {
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const { data, error } = await supabase
          .from('applications')
          .select('*')
          .order('score', { ascending: false });

        if (error) throw error;

        applications = data || [];
        document.getElementById('loading').style.display = 'none';
        render();
      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Error: ' + err.message;
      }
    }

    function render() {
      const search = (document.getElementById('search').value || '').toLowerCase();
      const scoreMin = parseInt(document.getElementById('scoreFilter').value) || 0;
      const statusVal = document.getElementById('statusFilter').value;

      let filtered = applications.filter(j => {
        if (scoreMin > 0 && (j.score || 0) < scoreMin) return false;
        if (statusVal !== 'all' && j.status !== statusVal) return false;
        if (search && !`${j.company} ${j.title}`.toLowerCase().includes(search)) return false;
        return true;
      });

      document.getElementById('total').textContent = filtered.length;
      document.getElementById('avgScore').textContent = filtered.length
        ? Math.round(filtered.reduce((a, j) => a + (j.score || 0), 0) / filtered.length)
        : '-';
      document.getElementById('newCount').textContent = filtered.filter(j => j.status === 'NEW').length;

      if (!filtered.length) {
        document.getElementById('tableContainer').innerHTML = '<p style="padding:24px;text-align:center;color:#888">Sin resultados</p>';
        return;
      }

      let html = '<table><thead><tr>' +
        '<th onclick="sort(\'company\')">Empresa</th>' +
        '<th onclick="sort(\'title\')">Puesto</th>' +
        '<th onclick="sort(\'score\')">Score</th>' +
        '<th onclick="sort(\'status\')">Estado</th>' +
        '<th onclick="sort(\'created_at\')">Fecha</th>' +
        '<th>Links</th>' +
        '</tr></thead><tbody>';

      for (const j of filtered) {
        const scoreClass = j.score >= 85 ? 'score-high' : j.score >= 70 ? 'score-mid' : 'score-low';
        const statusClass = 'status-' + (j.status || 'new').toLowerCase();
        const date = j.created_at ? new Date(j.created_at).toLocaleDateString() : '-';

        html += '<tr>' +
          `<td data-label="Empresa">${esc(j.company)}</td>` +
          `<td data-label="Puesto">${esc(j.title)}</td>` +
          `<td data-label="Score"><span class="score ${scoreClass}">${j.score ?? '-'}</span></td>` +
          `<td data-label="Estado"><span class="status ${statusClass}">${j.status || 'NEW'}</span></td>` +
          `<td data-label="Fecha">${date}</td>` +
          `<td data-label="Links" class="links">${link(j.job_url, '🔗 Job')} ${link(j.cv_url, '📄 CV')} ${link(j.cover_url, '✉️ Cover')}</td>` +
          '</tr>';
      }

      html += '</tbody></table>';
      document.getElementById('tableContainer').innerHTML = html;
    }

    let sortDir = {};
    function sort(field) {
      sortDir[field] = !(sortDir[field]);
      const dir = sortDir[field] ? 1 : -1;
      applications.sort((a, b) => {
        const va = a[field] || '', vb = b[field] || '';
        return String(va).localeCompare(String(vb), undefined, { numeric: true }) * dir;
      });
      render();
    }

    function link(url, text) {
      return url ? `<a href="${esc(url)}" target="_blank">${text}</a> ` : '';
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = String(s || '');
      return d.innerHTML;
    }

    init();
  </script>
</body>
</html>
